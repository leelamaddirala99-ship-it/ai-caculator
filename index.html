<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Calculator (Demo)</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
</head>
<body>
  <header>
    <h1>AI Calculator — Demo</h1>
    <div class="controls">
      <button id="themeToggle">Toggle Theme</button>
      <button id="exportCsv">Export History CSV</button>
    </div>
  </header>

  <main>
    <section class="left">
      <textarea id="input" placeholder="Type an expression or natural-language question (e.g. 'integrate x^2' or 'what is 12 * (3 + 2)')"></textarea>
      <div class="actions">
        <button id="evalBtn">Evaluate</button>
        <button id="explainBtn">Explain</button>
        <button id="graphBtn">Graph</button>
      </div>

      <div id="result" class="card"></div>
      <div id="explanation" class="card"></div>
    </section>

    <aside class="right">
      <div class="card">
        <h3>History</h3>
        <ul id="history"></ul>
      </div>
      <div class="card">
        <h3>Advanced Features</h3>
        <ul>
          <li>Step-by-step full solutions</li>
          <li>Laplace / Fourier transforms</li>
          <li>Export PNG</li>
          <li>Cloud sync (not implemented)</li>
        </ul>
      </div>
    </aside>
  </main>

  <footer>Evaluate • Explain • Graph • Export</footer>

  <script src="https://cdn.jsdelivr.net/npm/mathjs@11.8.0/lib/browser/math.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.29.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
